<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Timonia</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Styles spécifiques pour centrer la page de login */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--surface2);
        }
        .login-container {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<bodybody class="light-theme">

    <div class="login-container">
        <div class="logo" style="margin-bottom: 20px; font-size: 1.8rem;">Timonia</div>
        <h1 class="fraunces" style="font-size: 1.5rem; margin-bottom: 10px;">Espace Salarié</h1>
        <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 30px;">Connectez-vous pour suivre votre projet.</p>

        <form id="auth-form">
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase;">Email Professionnel</label>
                <input type="email" id="email" placeholder="nom@veolia.com" required style="width: 100%; margin-top: 5px;">
            </div>
            <div style="text-align: left; margin-bottom: 25px;">
                <label style="font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase;">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required style="width: 100%; margin-top: 5px;">
            </div>
            <button type="submit" class="btn-main" style="width: 100%; font-size: 1rem;">Entrer dans mon espace</button>
        </form>

        <a href="index.html" style="display: block; margin-top: 20px; font-size: 0.8rem; color: var(--muted);">← Retour au site</a>
    </div>

    <script>
        document.getElementById('auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            btn.innerHTML = "Vérification...";
            btn.style.opacity = "0.7";

            // Simulation de connexion vers le dashboard
            setTimeout(() => {
                window.location.href = "dashboard.html"; 
            }, 1000);
        });
    </script>
</body class="light-theme">
</html>
